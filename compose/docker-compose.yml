networks:
  compose_default:
    external: true

services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - compose_default

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - portainer_data:/data
      - portainer_data:/etc/letsencrypt
    networks:
      - compose_default

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - portainer_data:/app/data
    networks:
      - compose_default

  website:
    image: nginx:alpine
    container_name: website
    restart: unless-stopped
    volumes:
      - /opt/homelab/website:/usr/share/nginx/html:ro
    networks:
      - compose_default

volumes:
  portainer_data:
    external: true
